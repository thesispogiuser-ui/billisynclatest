<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BilliSync — Smart Billiard System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎱</text></svg>">
</head>
<body>

  <div id="sync-indicator" class="sync-indicator sync-off">● Connecting...</div>

  <!-- LOGIN PAGE -->
  <div id="pg-login" class="login-wrap">
    <div class="login-bg-grid"></div>
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">🎱</div>
        <div class="title"><span class="gold">BILLI</span><span class="green">SYNC</span></div>
        <div class="subtitle">SMART BILLIARD SYSTEM</div>
      </div>

      <form onsubmit="doLogin(event)">
        <label class="form-label">Username</label>
        <input class="input" type="text" id="inp-user" placeholder="Enter username" autocomplete="username">

        <label class="form-label">Password</label>
        <div class="pw-wrap">
          <input class="input" type="password" id="inp-pass" placeholder="Enter password" autocomplete="current-password">
          <button type="button" class="pw-toggle" id="pw-toggle-btn" onclick="togglePw()">SHOW</button>
        </div>

        <div id="login-error" class="login-error hide"></div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="padding:14px;font-size:16px;letter-spacing:1px">
          LOG IN
        </button>
      </form>

      <div style="margin-top:14px;text-align:center">
        <button class="btn btn-ghost btn-full" onclick="showPage('register')">Create Account</button>
      </div>

    

      <div style="text-align:center;margin-top:16px">
        <span class="pill pill-green"><span class="dot dot-on"></span> System Online</span>
      </div>
    </div>
  </div>

  <!-- REGISTER PAGE -->
  <div id="pg-register" class="login-wrap hide">
    <div class="login-card" style="max-width:440px">
      <button class="back-btn" onclick="showPage('login')" style="margin-bottom:16px;font-size:13px">← Back to Login</button>
      <div class="login-logo" style="margin-bottom:24px">
        <div class="icon">✨</div>
        <div class="title" style="font-size:22px"><span class="gold">CREATE</span> <span class="green">ACCOUNT</span></div>
        <div class="subtitle">JOIN BILLISYNC TODAY</div>
      </div>

      <label class="form-label">Username</label>
      <input class="input" id="reg-user" placeholder="Choose a username" autocomplete="username">

      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input class="input" id="reg-pass" type="password" placeholder="Choose a password" autocomplete="new-password">
        <button type="button" class="pw-toggle" onclick="toggleRegPw()">SHOW</button>
      </div>

      <label class="form-label">Confirm Password</label>
      <input class="input" id="reg-pass2" type="password" placeholder="Repeat your password" autocomplete="new-password">

      <div id="reg-error" class="login-error hide"></div>
      <div id="reg-success" class="hide" style="color:var(--gr);font-size:13px;text-align:center;margin-bottom:10px"></div>

      <button class="btn btn-primary btn-full" id="reg-btn" onclick="createAccount()" style="padding:14px;font-size:15px">
        🎱 REGISTER NOW
      </button>

      <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--dm)">
        Already have an account? <a href="#" onclick="showPage('login')" style="color:var(--gr);text-decoration:none;font-weight:600">Sign In →</a>
      </div>
    </div>
  </div>

  <!-- MEMBER PAGE -->
  <div id="pg-member" class="hide">
    <div class="topbar">
      <div class="brand">
        <span class="brand-icon">🎱</span>
        <span class="brand-text"><span class="gold">BILLI</span><span class="green">SYNC</span></span>
      </div>
      <div class="topbar-right">
        <span class="topbar-user" id="m-username"></span>
        <span class="pill pill-green">Member</span>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div class="content">
      <div class="nav" id="m-nav"></div>
      <div id="m-body"></div>
    </div>
  </div>

  <!-- SHOPKEEPER PAGE -->
  <div id="pg-shop" class="hide">
    <div class="topbar">
      <div class="brand">
        <span class="brand-icon">🎱</span>
        <span class="brand-text"><span class="gold">BILLI</span><span class="green">SYNC</span></span>
      </div>
      <div class="topbar-right">
        <span class="topbar-user" id="s-username"></span>
        <span class="pill pill-gold">Shopkeeper</span>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div class="content">
      <div class="nav" id="s-nav"></div>
      <div id="s-body"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
